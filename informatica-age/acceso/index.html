<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Informática AGE Gratis — Temario Completo | OpositoresAGE</title>

<style>
  :root{
    --tinta:#1a1a1a; --gris:#555; --gris2:#888; --linea:#e6e3dc;
    --fondo:#faf9f6; --tarjeta:#ffffff; --oro:#c8a96e; --oro-d:#a8884e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--fondo); color:var(--tinta); line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:860px; margin:0 auto; padding:0 20px}

  /* ---- Cabecera ---- */
  header{text-align:center; padding:48px 20px 32px}
  .badge{
    display:inline-block; background:#f3eee2; color:var(--oro-d);
    font-size:13px; font-weight:600; padding:5px 14px; border-radius:20px;
    letter-spacing:.3px; margin-bottom:16px;
  }
  h1{font-size:30px; font-weight:700; letter-spacing:-.5px; margin-bottom:10px; line-height:1.25}
  header p{color:var(--gris); font-size:16px; max-width:560px; margin:0 auto}

  /* ---- Botón desplegar ---- */
  .toggle-wrap{text-align:center; margin:8px 0 28px}
  .toggle-btn{
    display:inline-flex; align-items:center; gap:10px;
    background:var(--tinta); color:#fff; border:none; cursor:pointer;
    font-family:inherit; font-size:17px; font-weight:600;
    padding:16px 32px; border-radius:10px; transition:background .15s, transform .1s;
  }
  .toggle-btn:hover{background:#000}
  .toggle-btn:active{transform:scale(.98)}
  .toggle-btn .chev{transition:transform .25s; font-size:14px}
  .toggle-btn.open .chev{transform:rotate(180deg)}

  /* ---- Índice de temas ---- */
  .indice{display:none; margin-bottom:32px}
  .indice.open{display:block; animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .tema-link{
    display:flex; align-items:center; gap:14px; width:100%;
    background:var(--tarjeta); border:1px solid var(--linea); border-radius:10px;
    padding:16px 18px; margin-bottom:10px; cursor:pointer; text-align:left;
    font-family:inherit; font-size:15px; color:var(--tinta); transition:border-color .15s, box-shadow .15s;
  }
  .tema-link:hover{border-color:var(--oro); box-shadow:0 2px 10px rgba(0,0,0,.04)}
  .tema-num{
    flex-shrink:0; width:34px; height:34px; border-radius:8px;
    background:#f3eee2; color:var(--oro-d); font-weight:700; font-size:15px;
    display:flex; align-items:center; justify-content:center;
  }
  .tema-link .nombre{font-weight:600}
  .tema-link .sub{display:block; font-size:13px; color:var(--gris2); font-weight:400; margin-top:2px}

  /* ---- Vista de tema ---- */
  .tema-vista{display:none}
  .tema-vista.active{display:block; animation:fade .3s ease}

  .navtop{
    display:flex; justify-content:space-between; gap:10px;
    margin-bottom:20px; position:sticky; top:0; background:var(--fondo);
    padding:14px 0; z-index:5; border-bottom:1px solid var(--linea);
  }
  .nav-btn{
    flex:1; display:flex; align-items:center; justify-content:center; gap:6px;
    background:var(--tarjeta); border:1px solid var(--linea); border-radius:8px;
    padding:11px 14px; cursor:pointer; font-family:inherit; font-size:14px; font-weight:600;
    color:var(--tinta); transition:border-color .15s, background .15s; min-height:44px;
  }
  .nav-btn:hover:not(:disabled){border-color:var(--oro); background:#fff}
  .nav-btn:disabled{opacity:.35; cursor:default}
  .nav-btn.inicio{flex:0 0 auto; padding:11px 16px; background:#f3eee2; color:var(--oro-d); border-color:transparent}

  .contenido{
    background:var(--tarjeta); border:1px solid var(--linea); border-radius:12px;
    padding:30px 28px; margin-bottom:24px;
  }
  .contenido h2{font-size:24px; font-weight:700; margin-bottom:6px; letter-spacing:-.3px}
  .contenido .tema-tag{color:var(--oro-d); font-weight:600; font-size:14px; margin-bottom:18px}
  .contenido h4{color:var(--oro-d); font-size:16px; font-weight:700; margin:22px 0 8px}
  .contenido ul{list-style:none; padding:0}
  .contenido li{
    padding:8px 0 8px 20px; position:relative; font-size:15px; color:#333;
    border-bottom:1px solid #f4f1ea;
  }
  .contenido li:before{content:"·"; position:absolute; left:6px; color:var(--oro); font-weight:700; font-size:20px; top:4px}
  .contenido li strong{color:var(--tinta)}

  /* ---- CTA pack ---- */
  .cta{
    background:linear-gradient(180deg,#fff 0%,#faf7f0 100%);
    border:1px solid var(--oro); border-radius:12px; padding:26px;
    text-align:center; margin-bottom:30px;
  }
  .cta h3{font-size:19px; margin-bottom:6px}
  .cta p{color:var(--gris); font-size:15px; margin-bottom:16px}
  .cta-btn{
    display:inline-block; background:var(--oro); color:#fff; text-decoration:none;
    font-weight:700; font-size:16px; padding:14px 28px; border-radius:9px; transition:background .15s;
  }
  .cta-btn:hover{background:var(--oro-d)}

  footer{text-align:center; padding:30px 20px 50px; color:var(--gris2); font-size:13px; border-top:1px solid var(--linea)}
  footer a{color:var(--gris); text-decoration:none}
  footer a:hover{color:var(--oro-d)}

  @media(max-width:600px){
    h1{font-size:25px}
    .contenido{padding:22px 18px}
    .nav-btn{font-size:13px; padding:11px 8px}
    .nav-btn.inicio span{display:none}
  }
</style>

<script>

const TEMAS = [
  {
    n:1, titulo:"Informática Básica: Hardware y Software", sub:"Bits, bytes, CPU, RAM, periféricos y licencias",
    html:`
    <h4>1.1 Representación de datos</h4>
    <ul>
      <li><strong>Bit:</strong> unidad mínima de información, valor 0 ó 1 (sistema binario).</li>
      <li><strong>Byte:</strong> 8 bits. Es la unidad básica para representar un carácter.</li>
      <li><strong>Múltiplos:</strong> 1 KB = 1.024 bytes | 1 MB = 1.024 KB | 1 GB = 1.024 MB | 1 TB = 1.024 GB | 1 PB = 1.024 TB.</li>
      <li><strong>Sistemas de numeración:</strong> Binario (base 2, dígitos 0-1), Octal (base 8, dígitos 0-7), Decimal (base 10, dígitos 0-9), Hexadecimal (base 16, dígitos 0-9 y A-F).</li>
      <li><strong>Codificación de caracteres:</strong> ASCII (7 bits, 128 caracteres), ASCII extendido (8 bits, 256 caracteres), Unicode/UTF-8 (estándar actual, compatible con todos los idiomas).</li>
    </ul>
    <h4>1.2 Hardware: componentes internos</h4>
    <ul>
      <li><strong>CPU (Unidad Central de Proceso):</strong> "cerebro" del ordenador. Realiza todos los cálculos y ejecuta instrucciones. Su velocidad se mide en GHz. Compuesta por: ALU (Unidad Aritmético-Lógica) y CU (Unidad de Control).</li>
      <li><strong>Memoria RAM:</strong> memoria principal, volátil (pierde datos al apagar). Almacena temporalmente los programas en ejecución. A mayor RAM, mayor capacidad multitarea.</li>
      <li><strong>Memoria ROM:</strong> memoria de solo lectura, no volátil. Contiene la BIOS/UEFI (programa de arranque básico). No se puede modificar por el usuario.</li>
      <li><strong>Memoria caché:</strong> memoria ultrarrápida integrada en la CPU. Almacena datos de uso frecuente. Niveles: L1 (más rápida), L2, L3.</li>
      <li><strong>HDD (disco duro mecánico):</strong> usa platos magnéticos giratorios. Más capacidad y barato, pero más lento. Velocidad en RPM (5400 o 7200 rpm).</li>
      <li><strong>SSD (disco de estado sólido):</strong> sin partes móviles, mucho más rápido que el HDD, silencioso y resistente a golpes. Más caro por GB.</li>
      <li><strong>Placa base (motherboard):</strong> circuito principal que conecta todos los componentes: zócalo CPU, ranuras RAM, PCI-e, puertos SATA, chipset, BIOS/UEFI.</li>
      <li><strong>Buses:</strong> canales de comunicación. Bus de datos, bus de direcciones, bus de control. Velocidad en MHz.</li>
      <li><strong>Tarjeta gráfica (GPU):</strong> procesa gráficos y vídeo. Integrada (en placa/CPU) o dedicada (independiente, con memoria VRAM propia).</li>
    </ul>
    <h4>1.3 Periféricos</h4>
    <ul>
      <li><strong>De entrada:</strong> teclado, ratón, escáner, micrófono, cámara web, lápiz óptico, lector de códigos de barras.</li>
      <li><strong>De salida:</strong> monitor, impresora, altavoces, auriculares, proyector, plóter.</li>
      <li><strong>Mixtos (E/S):</strong> pantalla táctil, impresora multifunción, módem, disco duro externo, memoria USB.</li>
      <li><strong>Tipos de impresora:</strong> láser (tóner, rápida), inyección de tinta (cartuchos, económica), matricial (agujas, papel continuo), térmica (tickets).</li>
    </ul>
    <h4>1.4 Software y licencias</h4>
    <ul>
      <li><strong>Software de sistema:</strong> sistema operativo (Windows, Linux, macOS) + controladores (drivers) + utilidades.</li>
      <li><strong>Software de aplicación:</strong> programas para el usuario: procesadores de texto, hojas de cálculo, navegadores.</li>
      <li><strong>Software libre:</strong> se puede usar, estudiar, modificar y distribuir libremente. Ej: Linux, LibreOffice. Licencia GPL.</li>
      <li><strong>Software propietario:</strong> código fuente privado. El usuario solo tiene licencia de uso. Ej: Windows, Microsoft Office.</li>
      <li><strong>Freeware:</strong> gratuito pero propietario (no se puede modificar). Ej: Adobe Acrobat Reader.</li>
      <li><strong>Shareware:</strong> versión de prueba gratuita limitada. Requiere pago para la completa.</li>
      <li><strong>Open Source:</strong> código fuente público, se puede ver/modificar. No siempre es libre legalmente.</li>
    </ul>`
  },
  {
    n:2, titulo:"Sistema Operativo Windows", sub:"Interfaz, archivos, atajos de teclado y seguridad",
    html:`
    <h4>2.1 Conceptos de sistema operativo</h4>
    <ul>
      <li><strong>Sistema operativo (SO):</strong> software base que gestiona los recursos hardware y permite ejecutar aplicaciones. Intermediario entre hardware y usuario.</li>
      <li><strong>Funciones del SO:</strong> gestión de procesos (multitarea), de memoria, del sistema de archivos, de dispositivos, e interfaz con el usuario.</li>
      <li><strong>Tipos de SO:</strong> monousuario/multiusuario, monotarea/multitarea, tiempo real, distribuido.</li>
      <li><strong>Versiones de Windows:</strong> XP (obsoleta), 7 (obsoleta), 10 (actual), 11 (más reciente). La AGE usa principalmente Windows 10.</li>
    </ul>
    <h4>2.2 Interfaz y estructura</h4>
    <ul>
      <li><strong>Escritorio:</strong> área de trabajo principal. Contiene iconos de acceso directo y la barra de tareas.</li>
      <li><strong>Barra de tareas:</strong> parte inferior. Botón Inicio, apps ancladas, área de notificación (reloj, red, volumen).</li>
      <li><strong>Explorador de archivos:</strong> administra archivos y carpetas. Acceso rápido: Win+E.</li>
      <li><strong>Panel de control:</strong> configuración clásica del sistema. En Windows 10 convive con la app Configuración.</li>
      <li><strong>Administrador de tareas (Ctrl+Alt+Supr o Ctrl+Shift+Esc):</strong> muestra procesos activos, uso de CPU/RAM/disco/red, permite finalizar procesos bloqueados.</li>
    </ul>
    <h4>2.3 Gestión de archivos y carpetas</h4>
    <ul>
      <li><strong>Extensiones importantes:</strong> .exe (ejecutable), .docx (Word), .xlsx (Excel), .pptx (PowerPoint), .pdf, .txt, .jpg/.png/.gif (imagen), .mp3 (audio), .mp4 (vídeo), .zip/.rar (comprimido).</li>
      <li><strong>Atributos de archivo:</strong> solo lectura, oculto, sistema, archivo.</li>
      <li><strong>Papelera de reciclaje:</strong> almacena archivos eliminados. Eliminar definitivamente: Shift+Delete. Los archivos en unidades de red NO van a la papelera.</li>
      <li><strong>Accesos directos:</strong> enlaces a archivos/programas. Borrarlos no borra el original.</li>
      <li><strong>Búsqueda — comodines:</strong> * (cualquier cadena) y ? (un carácter).</li>
    </ul>
    <h4>2.4 Atajos de teclado imprescindibles</h4>
    <ul>
      <li><strong>Edición:</strong> Ctrl+C (copiar), Ctrl+X (cortar), Ctrl+V (pegar), Ctrl+Z (deshacer), Ctrl+Y (rehacer), Ctrl+A (seleccionar todo).</li>
      <li><strong>Archivos:</strong> F2 (renombrar), Delete (papelera), Shift+Delete (eliminar permanente), Alt+Enter (propiedades).</li>
      <li><strong>Ventanas:</strong> Alt+F4 (cerrar), Alt+Tab (cambiar ventana), Win+D (escritorio), Win+L (bloquear), Win+R (ejecutar), Win+E (explorador), Win+I (configuración).</li>
      <li><strong>Capturas:</strong> ImprPant (pantalla completa al portapapeles), Win+Shift+S (recorte), Win+ImprPant (guarda en Imágenes).</li>
      <li><strong>Sistema:</strong> Ctrl+Alt+Supr (seguridad), Ctrl+Shift+Esc (administrador de tareas), F1 (ayuda), F5 (actualizar).</li>
    </ul>
    <h4>2.5 Seguridad en Windows</h4>
    <ul>
      <li><strong>Windows Defender:</strong> antivirus integrado. Protección en tiempo real contra malware.</li>
      <li><strong>Firewall de Windows:</strong> controla el tráfico de red entrante y saliente. Bloquea conexiones no autorizadas.</li>
      <li><strong>Control de cuentas de usuario (UAC):</strong> pide confirmación antes de hacer cambios en el sistema.</li>
      <li><strong>Tipos de cuenta:</strong> Administrador (acceso total), Usuario estándar (limitado), Invitado (muy restringido).</li>
      <li><strong>BitLocker:</strong> cifrado de disco completo (ediciones Pro y Enterprise).</li>
    </ul>`
  },
  {
    n:3, titulo:"Microsoft Word", sub:"Interfaz, formato, índices y combinar correspondencia",
    html:`
    <h4>3.1 Interfaz de Word</h4>
    <ul>
      <li><strong>Cinta de opciones:</strong> fichas (Inicio, Insertar, Diseño, Disposición, Referencias, Correspondencia, Revisar, Vista) y grupos.</li>
      <li><strong>Barra de acceso rápido:</strong> superior, personalizable. Guardar, Deshacer, Rehacer por defecto.</li>
      <li><strong>Barra de estado:</strong> inferior. Número de página, número de palabras, idioma, vista activa.</li>
      <li><strong>Vistas:</strong> Diseño de impresión (más usada), Lectura, Diseño web, Esquema, Borrador.</li>

    <h4>3.2 Configuración del documento</h4>
    <ul>
      <li><strong>Márgenes:</strong> Disposición → Márgenes. Predeterminado: 2,5 cm todos los lados.</li>
      <li><strong>Orientación:</strong> Vertical o Apaisada/Horizontal.</li>
      <li><strong>Tamaño de papel:</strong> A4 (210×297 mm) estándar en España.</li>
      <li><strong>Salto de página:</strong> Ctrl+Enter.</li>
      <li><strong>Salto de sección:</strong> permite márgenes/orientación distintos en partes del documento.</li>
    </ul>
    <h4>3.3 Formato de texto y párrafo</h4>
    <ul>
      <li><strong>Formato de carácter:</strong> negrita (Ctrl+N), cursiva (Ctrl+K), subrayado (Ctrl+S), superíndice, subíndice, color, resaltado.</li>
      <li><strong>Formato de párrafo:</strong> alineación (Ctrl+Q izq, Ctrl+T centro, Ctrl+D dcha, Ctrl+J justificado), interlineado, espaciado, sangría.</li>
      <li><strong>Estilos:</strong> conjunto de formatos guardados. Los estilos de título (Título 1, 2...) generan el índice automático.</li>

    <h4>3.4 Herramientas avanzadas</h4>
    <ul>
      <li><strong>Buscar y reemplazar:</strong> Ctrl+B (buscar), Ctrl+L (reemplazar).</li>
      <li><strong>Tabla de contenido (índice automático):</strong> Referencias → Tabla de contenido. Se genera a partir de los estilos Título. Se actualiza con F9.</li>

    <h4>3.5 Combinar correspondencia</h4>

      <li><strong>Qué es:</strong> genera documentos personalizados (cartas, etiquetas, sobres) combinando un Word con una base de datos (Excel, Access).</li>

    </ul>`
  },
  {
    n:4, titulo:"Microsoft Excel", sub:"Celdas, fórmulas, funciones y herramientas de datos",
    html:`
    <h4>4.1 Conceptos básicos</h4>
    <ul>
      <li><strong>Libro:</strong> archivo de Excel (.xlsx). Contiene una o varias hojas.</li>
      <li><strong>Hoja:</strong> cuadrícula de filas (1 a 1.048.576) y columnas (A a XFD, total 16.384).</li>
      <li><strong>Celda:</strong> intersección de fila y columna. Referencia: letra de columna + número de fila. Ej: A1, B3.</li>
      <li><strong>Rango:</strong> conjunto de celdas. Ej: A1:A10 (columna), A1:C3 (bloque), A1:A5;C1:C5 (no contiguo).</li>
      <li><strong>Barra de fórmulas:</strong> muestra el contenido de la celda activa. A la izquierda, el cuadro de nombres.</li>
      <li><strong>Tipos de datos:</strong> número (alineado dcha), texto (izq), fecha/hora, lógico (VERDADERO/FALSO), error (#¡DIV/0!, #¡VALOR!, #¡REF!, #N/A).</li>
    </ul>
    <h4>4.2 Fórmulas y operadores</h4>
    <ul>
      <li><strong>Fórmulas:</strong> siempre empiezan por =. Combinan valores, referencias, operadores y funciones.</li>
      <li><strong>Aritméticos:</strong> + - * / ^ (potencia) % (porcentaje).</li>
      <li><strong>Comparación:</strong> = (igual), &lt;&gt; (distinto), &lt; &gt; &lt;= &gt;=. Devuelven VERDADERO o FALSO.</li>
      <li><strong>Texto:</strong> &amp; (concatenar). Ej: ="Hola "&amp;A1.</li>
      <li><strong>Referencia relativa:</strong> A1. Cambia al copiar.</li>
      <li><strong>Referencia absoluta:</strong> $A$1. NO cambia al copiar. La tecla F4 alterna entre tipos.</li>
      <li><strong>Referencia mixta:</strong> $A1 (columna fija) o A$1 (fila fija).</li>
    </ul>
    <h4>4.3 Funciones esenciales</h4>
    <ul>
      <li><strong>SUMA(rango):</strong> suma los valores. Ej: =SUMA(A1:A10)</li>
      <li><strong>PROMEDIO(rango):</strong> media aritmética.</li>
      <li><strong>MAX / MIN(rango):</strong> valor máximo / mínimo.</li>
      <li><strong>CONTAR / CONTARA / CONTAR.SI:</strong> cuenta números / no vacías / con condición.</li>
      <li><strong>SI(prueba; verdadero; falso):</strong> función condicional. Ej: =SI(A1&gt;5;"Aprobado";"Suspendido")</li>
      <li><strong>Y / O:</strong> AND/OR lógicos, dentro de SI.</li>
      <li><strong>BUSCARV(valor; tabla; columna; [ordenado]):</strong> busca en la 1ª columna y devuelve otra. Último argumento FALSO = exacta.</li>
      <li><strong>CONCATENAR o &amp;:</strong> une textos.</li>
      <li><strong>HOY() / AHORA():</strong> fecha actual / fecha y hora.</li>
      <li><strong>IZQUIERDA / DERECHA / EXTRAE:</strong> extrae caracteres de un texto.</li>
      <li><strong>REDONDEAR / ENTERO / TRUNCAR:</strong> redondea / al entero inferior / quita decimales sin redondear.</li>
      <li><strong>SI.ERROR(valor; valor_si_error):</strong> devuelve alternativa si hay error. Evita #¡DIV/0!.</li>
      <li><strong>MAYUSC / MINUSC / NOMPROPIO:</strong> cambia mayúsculas/minúsculas.</li>
    </ul>
    <h4>4.4 Atajos de formato</h4>

// ===== RENDER ÍNDICE =====
const indice = document.getElementById('indice');
const cont = document.getElementById('temasContenedor');

TEMAS.forEach(t=>{
  const b=document.createElement('button');
  b.className='tema-link';
  b.onclick=()=>abrirTema(t.n);
  b.innerHTML=`<span class="tema-num">${t.n}</span>
    <span class="nombre">Tema ${t.n} — ${t.titulo}<span class="sub">${t.sub}</span></span>`;
  indice.appendChild(b);
});

// ===== RENDER VISTAS DE TEMA =====
TEMAS.forEach((t,i)=>{
  const v=document.createElement('div');
  v.className='tema-vista';
  v.id='tema-'+t.n;
  const prev=i>0?TEMAS[i-1]:null;
  const next=i<TEMAS.length-1?TEMAS[i+1]:null;
  v.innerHTML=`
    <div class="navtop">
      <button class="nav-btn" ${prev?`onclick="abrirTema(${prev.n})"`:'disabled'}>← ${prev?'Tema '+prev.n:'Anterior'}</button>
      <button class="nav-btn inicio" onclick="volverIndice()">☰ <span>Índice</span></button>
      <button class="nav-btn" ${next?`onclick="abrirTema(${next.n})"`:'disabled'}>${next?'Tema '+next.n:'Siguiente'} →</button>
    </div>
    <div class="contenido">
      <div class="tema-tag">TEMA ${t.n}</div>
      <h2>${t.titulo}</h2>
      ${t.html}
    </div>
    <div class="cta">
      <h3>¿Quieres practicar con 300 preguntas tipo test?</h3>
      <p>Este temario es gratis. El pack completo incluye 300 preguntas con explicación de cada respuesta, los 6 temas y modo examen.</p>
      <a href="https://pay.hotmart.com/C97752336" class="cta-btn">Ver el pack completo</a>
    </div>`;
  cont.appendChild(v);
});

// ===== NAVEGACIÓN =====
function toggleIndice(){
  const btn=document.getElementById('toggleBtn');
  indice.classList.toggle('open');
  btn.classList.toggle('open');
}
function abrirTema(n){
  document.querySelectorAll('.tema-vista').forEach(v=>v.classList.remove('active'));
  document.getElementById('tema-'+n).classList.add('active');
  indice.classList.remove('open');
  document.getElementById('toggleBtn').classList.remove('open');
  document.querySelector('.toggle-wrap').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
}
function volverIndice(){
  document.querySelectorAll('.tema-vista').forEach(v=>v.classList.remove('active'));
  document.querySelector('.toggle-wrap').style.display='block';
  indice.classList.add('open');
  document.getElementById('toggleBtn').classList.add('open');
  window.scrollTo({top:0,behavior:'smooth'});
}

// Si la URL trae ?t=N (ej. /informatica-age/acceso/?t=3), abre ese tema al entrar.
(function(){
  var m = new URLSearchParams(window.location.search).get('t');
  var n = parseInt(m,10);
  if(n>=1 && n<=6){ abrirTema(n); }
})();
</script>
